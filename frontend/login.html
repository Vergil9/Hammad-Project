<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusConnect</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
        }
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: var(--gray);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #34D399;
            border: 1px solid #10B981;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #F87171;
            border: 1px solid #EF4444;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#818CF8" />
                        <stop offset="100%" stop-color="#C084FC" />
                    </linearGradient>
                </defs>
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            CampusConnect
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <div id="alert-box" class="alert"></div>

            <!-- Login Form -->
            <form id="login-form" class="form-section active">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="form-section">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Create Account</h2>
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-role">Role</label>
                    <select id="reg-role" required>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>
        </div>
    </main>

    <script>
        // Point to the live Render backend
        const API_URL = 'https://hammad-project-prwo.onrender.com/api';

        // Check if already logged in
        if (localStorage.getItem('campusconnect_token')) {
            window.location.href = 'dashboard.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            hideAlert();
        }

        function showAlert(message, isError = true) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alert-box').style.display = 'none';
        }

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            try {
                btn.textContent = 'Logging in...';
                btn.disabled = true;
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('campusconnect_token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showAlert(data.detail || 'Login failed. Please check your credentials.');
                }
            } catch (error) {
                showAlert('Network error. Make sure the backend is running on http://127.0.0.1:8000');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Register Handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            const email = document.getElementById('reg-email').value;
            const full_name = document.getElementById('reg-name').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            try {
                btn.textContent = 'Creating account...';
                btn.disabled = true;
                
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, full_name, password, role })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Account created successfully! Please login.', false);
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showAlert(data.detail || 'Registration failed.');
                }
            } catch (error) {
                showAlert('Network error. Make sure the backend is running on http://127.0.0.1:8000');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
